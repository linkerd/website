{{ $data := partial "docs/get-cli-file" . }}
<table class="keyval">
  <thead>
    <tr>
      <th>
        Command
      </th>
      <th>
        Description
      </th>
    </tr>
  </thead>
  <tbody>
    {{ range $data.CLIReference }}
      {{/* Do not list subcommands */}}
      {{ if not (in .Name " ") }}
        <tr>
          <td>
            <a href="{{ .Name }}/">
              {{ .Name }}
            </a>
          </td>
          <td>
            {{ .Synopsis | markdownify }}
          </td>
        </tr>
      {{ end }}
    {{ end }}
  </tbody>
</table>
